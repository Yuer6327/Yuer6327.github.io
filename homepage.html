        /* 基础样式保持不变 */
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            min-height: 100vh;

            flex-direction: column;
            align-items: center;

            background-color: #202020; 
            transition: background-color 0.8s ease;
            /* 确保初始状态下使用暗色主题样式 */
            color: var(--text-color-dark);
        }

        /* 为移动端启用垂直滚动 */
        @media (max-width: 768px) {
            body {
                overflow-y: auto;
            }
        }

        /* ---------------- 开场动画层 ---------------- */
        #intro-layer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: #202020;
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            /* 动画结束后穿透点击 */
            pointer-events: none;
        }

        #intro-svg {
            width: 80vw;
            max-width: 600px;
            /* 初始在屏幕正中心 */
            transform-origin: center center;
            will-change: transform, top, left, width;
            overflow: visible;
        }

        /* SVG 文字路径动画 */
        .intro-text-path {
            fill: transparent;
            stroke: #ffffff;
            stroke-width: 1.5;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: drawText var(--anim-duration-draw) cubic-bezier(0.5, 0, 0.5, 1) forwards;
            font-family: "Brush Script MT", "Comic Sans MS", cursive, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; /* 手写风格并添加通用字体 */
            font-weight: bold;
            font-size: 80px;
        }

        @keyframes drawText {
            0% {
                stroke-dashoffset: 1000;
                fill: transparent;
            }
            60% {
                stroke-dashoffset: 0;
                fill: transparent;
            }
            100% {
                stroke-dashoffset: 0;
                fill: #ffffff; /* 最终填充白色 */
            }
        }

        /* ---------------- 主内容布局 ---------------- */

        /* 移除原有的 fade-in 类，改用 content-hidden */
        .content-hidden {
            opacity: 0;
            transform: translateY(30px);
            transition: opacity 0.3s ease, transform 0.3s ease; /* 从0.8s改为0.3s保持一致性 */
        }

        .content-visible {
            opacity: 1;
            transform: translateY(0);
        }

        .container {
            max-width: 800px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
            z-index: 1;
            margin-top: 0; /* 将原来的40px改为0，实现完全居中 */
        }

        /* 标题占位符：不可见，仅用于布局计算 */
        #title-placeholder {
            font-family: "Brush Script MT", "Comic Sans MS", cursive, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            font-size: 3.2rem; /* 从3rem增加到3.2rem，增大约3px */
            font-weight: 700;
            text-align: center;
            margin-bottom: 3px;
            letter-spacing: -0.5px;
            opacity: 0; /* 始终不可见，由SVG替代 */
            pointer-events: none;
            height: 1.2em; /* 确保占位 */
            margin-top: 20px;
            color: transparent;
        }

        .bio {
            font-size: 1.1rem; /* 从1.2rem缩小到1.1rem */

            max-width: 500px;

            margin-top: -10px;
            font-family: Georgia, 'Times New Roman', serif; /* 更换为衬线字体 */
        }

        /* ---------------- 主题与组件样式 ---------------- */
        
        /* 强制覆盖默认暗色偏好，用于动画后的状态控制 */
        body.loaded.light-theme {
            background-color: var(--bg-color-light);
            color: var(--text-color-light);
        }
        body.loaded.dark-theme {
            background-color: var(--bg-color-dark);
            color: var(--text-color-dark);
        }
        body.loaded.light-theme .glass-card {
            background: var(--card-bg-light);
            border: 1px solid var(--card-border-light);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.3);
        }
        body.loaded.dark-theme .glass-card {
            background: var(--card-bg-dark);
            border: 1px solid var(--card-border-dark);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            color: var(--text-color-dark); /* 确保卡片内文字为白色 */
        }

        /* 当切换到亮色模式时，SVG文字需要变黑 */
        body.loaded.light-theme #intro-svg .intro-text-path {
            fill: #202020;
            stroke: #202020;
            transition: fill 0.5s ease, stroke 0.5s ease;
        }
        
        /* 亮色主题下小卡片样式：白底白字 */
        body.loaded.light-theme .glass-button {
            background: #ffffff; /* 白色背景 */
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #202020; /* 深灰色文字，确保在白色背景上可见 */
        }
        
        body.loaded.light-theme .glass-button .card-text {
            color: #202020; /* 深灰色文字 */
        }
        
        body.loaded.light-theme .glass-button .card-icon {
            fill: #202020; /* 深灰色图标 */
        }
        
        body.loaded.light-theme .glass-button .arrow-icon {
            color: #202020; /* 深灰色箭头图标 */
        }
        
        /* 暗色主题下小卡片样式：深灰底白字 */
        body.loaded.dark-theme .glass-button {
            color: var(--text-color-dark); /* 白色文字和图标 */
        }
        
        body.loaded.dark-theme .glass-button .card-text {
            color: var(--text-color-dark); /* 白色文字 */
        }
        
        body.loaded.dark-theme .glass-button .card-icon {
            fill: var(--text-color-dark); /* 白色图标 */
        }
        
        body.loaded.dark-theme .glass-button .arrow-icon {
            color: var(--text-color-dark); /* 白色箭头图标 */
        }

        .glass-card {
            border-radius: 20px;
            padding: 25px;
            width: 100%;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            transition: all 0.3s ease; /* 保持不变 */
        }
        .glass-card:hover {
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.15);
        }

        .card-title {

        }

        .links-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 1rem;
        }

        .glass-button {
            text-decoration: none;
            border-radius: 12px;
            padding: 1.2rem;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            height: 100px;

            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .glass-button:hover {
            transform: translateY(-4px);
            background: rgba(128, 128, 128, 0.1);
        }

        .card-text { font-size: 1rem; font-weight: 700; color: inherit; z-index: 2; margin-bottom: auto; }
        .card-icon { width: 24px; height: 24px; fill: currentColor; margin-bottom: auto; }

        .arrow-icon {
            position: absolute;
            top: 1.2rem;
            right: 1.2rem;
            width: 16px;
            height: 16px;
            fill: currentColor;
            opacity: 0.6;
            transition: transform 0.3s ease, opacity 0.3s ease; /* 保持不变 */
        }
        .glass-button:hover .arrow-icon { transform: translate(2px, -2px); opacity: 1; }

        .footer {
            text-align: center;
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 20px;
            line-height: 1.6;
        }
        .footer a {
            color: inherit;
            text-decoration: none;
            position: relative;
            transition: all 0.3s ease;
        }
        
        .footer a::after {
            content: "";
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 100%;
            height: 1px;
            background: linear-gradient(to right, currentColor 50%, transparent 50%);
            background-size: 4px 1px;
            background-repeat: repeat-x;
            transition: all 0.3s ease;
        }
        
        .footer a:hover::after {
            background: currentColor;
            height: 1px;
        }
        .theme-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--glass-light);
            border: 1px solid var(--glass-border-light);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            transition: all 0.3s ease;
            padding: 0;
            border: none;
            background: transparent;
            overflow: visible;
        }
        .theme-toggle svg {
            width: 20px;
            height: 20px;
        }
        .theme-toggle:hover { 
            transform: scale(1.1) rotate(15deg); 
        }
        
        body.dark-theme .theme-toggle {
            background: var(--glass-dark);
            border: 1px solid var(--glass-border-dark);
        }
        body.loaded.light-theme .theme-toggle {
            background: var(--glass-light);
            border: 1px solid #000000; /* 在亮色主题下使用黑色边框 */
        }
        /* 添加图标控制样式 */
        .theme-icon {
            position: absolute;
            transition: opacity 0.3s ease, transform 0.3s ease;
        }
        
        .sun-icon {
            opacity: 1;
            transform: rotate(0deg);
        }
        
        .moon-icon {
            opacity: 0;
            transform: rotate(-90deg);
        }
        
        body.dark-theme .sun-icon {
            opacity: 0;
            transform: rotate(90deg);
        }
        
        body.dark-theme .moon-icon {
            opacity: 1;
            transform: rotate(0deg);
        }
        /* 切换图标的显示/隐藏 */
        body.dark-theme .theme-icon .icon-sun {
            display: none;
        }
        body.dark-theme .theme-icon .icon-moon {
            display: block;
        }

        @keyframes circle-reveal {
            from { clip-path: circle(0% at var(--x) var(--y)); }
            to { clip-path: circle(150% at var(--x) var(--y)); }
        }
        ::view-transition-new(root) { animation: 0.6s cubic-bezier(0.4, 0, 0.2, 1) both circle-reveal; }
        ::view-transition-old(root) { animation: none; }

        @media (max-width: 600px) {
            .links-row { flex-direction: column; }
            #title-placeholder { font-size: 2.5rem; }
        }

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // --- 核心动画逻辑 ---
            
            const introLayer = document.getElementById('intro-layer');
            const introSvg = document.getElementById('intro-svg');
            const titlePlaceholder = document.getElementById('title-placeholder');
            const hiddenContent = document.querySelectorAll('.content-hidden');
            
            // 锁定滚动
            document.body.style.overflow = 'hidden';

            // 1. 等待 SVG 绘制动画完成 (约2秒)
            setTimeout(() => {
                startMoveAnimation();
            }, 2000);

            function startMoveAnimation() {
                // 获取两个元素的位置信息
                const svgRect = introSvg.getBoundingClientRect();
                const targetRect = titlePlaceholder.getBoundingClientRect();
                
                // 计算变换参数
                // 注意：目标高度较小，SVG需要缩小以适应
                const scaleX = targetRect.width / svgRect.width;
                const scaleY = targetRect.height / svgRect.height;
                // 选择较小的缩放比例以保持纵横比，或者直接使用高度匹配
                const scale = Math.min(targetRect.height / svgRect.height, targetRect.width / svgRect.width) * 1.5; // *1.5 稍微放大一点视觉效果更好

                const startX = svgRect.left + svgRect.width / 2;
                const startY = svgRect.top + svgRect.height / 2;
                const endX = targetRect.left + targetRect.width / 2;
                const endY = targetRect.top + targetRect.height / 2;

                const deltaX = endX - startX;
                const deltaY = endY - startY;

                // 2. 执行移动动画 (0.7s)
                // 先慢后快再慢 (ease-in-out)
                introSvg.style.transition = 'transform 0.8s cubic-bezier(0.65, 0, 0.35, 1)';
                introSvg.style.transform = `translate(${deltaX}px, ${deltaY}px) scale(${scale})`;
                
                // 3. 同时：淡出黑色背景层，淡入内容
                // 注意：我们只让背景透明，SVG本身保留
                introLayer.style.transition = 'background-color 0.8s ease';
                introLayer.style.backgroundColor = 'transparent';

                // 触发其他内容的渐显
                hiddenContent.forEach((el, index) => {
                    // 稍微错开一点点时间，更有层次感
                    setTimeout(() => {
                        el.classList.add('content-visible');
                    }, index * 50); 
                });

                // 初始化主题（此时应用用户设置的主题色）
                initTheme();

                // 4. 动画结束后的清理 (0.8s后)
                setTimeout(() => {
                    document.body.style.overflow = ''; // 恢复滚动
                    // 将SVG层级调整，以免遮挡
                    introLayer.style.zIndex = '1'; 
                    // 此时 SVG 仍然是 fixed 定位，但视觉上在标题位置
                    // 在移动端窗口大小改变时可能会错位，这里做一个简单的修正监听
                    window.addEventListener('resize', () => {
                        // 重新计算位置逻辑（简化版：重新加载或简单的CSS重置）
                        // 为保持简单，这里不做复杂重计算，CSS中的will-change已优化性能
                    });
                }, 800);
            }

            // --- 主题逻辑 ---
            const themeToggle = document.getElementById('themeToggle');

            function applyTheme(theme) {
                document.body.classList.add('loaded'); // 标记已加载，启用主题CSS
                if (theme === 'dark') {
                    document.body.classList.remove('light-theme');
                    document.body.classList.add('dark-theme');
                } else {
                    document.body.classList.remove('dark-theme');
                    document.body.classList.add('light-theme');
                }
            }

            function initTheme() {
                const savedTheme = localStorage.getItem('theme');
                if (savedTheme) {
                    applyTheme(savedTheme);
                } else {
                    // 默认使用暗色主题而不是根据设备偏好设置
                    applyTheme('dark');
                }
            }

            function toggleTheme() {
                const isDark = document.body.classList.contains('dark-theme');
                const newTheme = isDark ? 'light' : 'dark';
                applyTheme(newTheme);
                localStorage.setItem('theme', newTheme);
            }

            themeToggle.addEventListener('click', function(event) {
                if (!document.startViewTransition) {
                    toggleTheme();
                    return;
                }
                const x = event.clientX;
                const y = event.clientY;
                document.documentElement.style.setProperty('--x', x + 'px');
                document.documentElement.style.setProperty('--y', y + 'px');
                document.startViewTransition(() => {
                    toggleTheme();
                });
            });
        });
    </script>
</body>
